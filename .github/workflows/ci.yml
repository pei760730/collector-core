name: ci

on:
  push:
    branches: [main]
  pull_request: {}
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      # engines >=20,而 consumer-bump 驗證跑 node 22 —— core 自己的 CI 只測 20 會漏掉
      # 「20 綠、22 紅」的缺口(bump 時才炸)。兩個版本都直接在這裡守。
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      # typecheck 用 declaration:false,宣告檔限定錯誤(TS4023/TS2742 類)不會在上面兩步現形;
      # 少了這步,壞宣告的 PR 會綠著 merge,炸點延後到 release.mjs 本機 build 或消費端 npm ci 的 prepare。
      - run: npm run build
